version: "3.8"

services:
  trinity:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trinity
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_KEY_SECRET=${TWITTER_API_KEY_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_TOKEN_SECRET=${TWITTER_ACCESS_TOKEN_SECRET}
    volumes:
      - ./logs:/app/logs
      - ./history:/app/history
      - ./.last_run:/app/.last_run
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  trinity-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trinity-scheduler
    restart: unless-stopped
    command: ["python", "-c", "from src.pipeline_store import MyPipelineStore; import time; store = MyPipelineStore(); time.sleep(999999)"]
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_KEY_SECRET=${TWITTER_API_KEY_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_TOKEN_SECRET=${TWITTER_ACCESS_TOKEN_SECRET}
    volumes:
      - ./logs:/app/logs
      - ./history:/app/history
      - ./.last_run:/app/.last_run
    profiles:
      - scheduler
